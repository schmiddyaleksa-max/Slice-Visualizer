name: Build QMOD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build jq curl zip

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.info.version' qpm.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup QPM
        run: |
          mkdir -p $HOME/.local/bin
          curl -sL "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip" \
            -o /tmp/qpm.zip
          unzip -q /tmp/qpm.zip -d $HOME/.local/bin
          chmod +x $HOME/.local/bin/qpm
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Restore dependencies
        # libil2cpp is declared with headersOnly:true in qpm.json so QPM
        # skips downloading from il2cpp.thnght.pro (which is permanently offline).
        # All other deps come from the QPM registry normally.
        run: qpm restore

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_CXX_STANDARD=20 \
            -G Ninja

      - name: Build
        run: cmake --build build --config RelWithDebInfo

      - name: Package QMOD
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p qmod_build/libs/arm64-v8a

          cp build/libslicevisualizer.so qmod_build/libs/arm64-v8a/

          sed -e "s/\${mod_name}/Slice Visualizer/g" \
              -e "s/\${mod_id}/slicevisualizer/g" \
              -e "s/\${version}/$VERSION/g" \
              mod.template.json > qmod_build/mod.json

          [ -f cover.png ] && cp cover.png qmod_build/

          cd qmod_build
          zip -r "../slicevisualizer-${VERSION}.qmod" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          path: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          body: |
            # Slice Visualizer v${{ steps.version.outputs.version }}
            **Beat Saber 1.40.8 Compatible**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
