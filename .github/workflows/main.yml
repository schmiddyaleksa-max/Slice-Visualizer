name: Build QMOD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build jq curl zip

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'

      - name: Get version from qpm.json
        id: version
        run: |
          VERSION=$(jq -r '.info.version' qpm.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download and setup QPM
        run: |
          mkdir -p $HOME/.local/bin
          # Pinned to the non-musl x64 build (the musl build also appears in results
          # which broke dynamic URL selection — use a direct URL instead)
          curl -L "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip" \
            -o /tmp/qpm.zip
          unzip -q /tmp/qpm.zip -d $HOME/.local/bin
          chmod +x $HOME/.local/bin/qpm
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          qpm --version

      - name: Restore dependencies with QPM
        run: |
          # QPM restore downloads headers into extern/ and generates
          # qpm_defines.cmake and extern.cmake — do NOT overwrite these.
          qpm restore
          echo "QPM restore exit code: $?"

      - name: Verify dependencies were restored
        run: |
          echo "=== Checking required headers ==="
          if [ ! -f "extern/includes/modloader/shared/modloader.hpp" ]; then
            echo "ERROR: modloader headers not found"
            echo "Contents of extern/includes/:"
            find extern/includes -maxdepth 2 -type d 2>/dev/null || echo "(empty or missing)"
            exit 1
          fi
          if [ ! -f "extern/includes/beatsaber-hook/shared/utils/hooking.hpp" ]; then
            echo "ERROR: beatsaber-hook headers not found"
            exit 1
          fi
          if [ ! -f "extern/includes/questui/shared/QuestUI.hpp" ]; then
            echo "ERROR: questui headers not found"
            exit 1
          fi
          if [ ! -f "extern/includes/config-utils/shared/config-utils.hpp" ]; then
            echo "ERROR: config-utils headers not found"
            exit 1
          fi
          echo "All required headers found!"

      - name: Verify QPM-generated cmake files
        run: |
          echo "=== Checking QPM-generated cmake files ==="
          if [ ! -f "qpm_defines.cmake" ]; then
            echo "ERROR: qpm_defines.cmake not generated by QPM restore"
            exit 1
          fi
          if [ ! -f "extern.cmake" ]; then
            echo "ERROR: extern.cmake not generated by QPM restore"
            exit 1
          fi
          echo "qpm_defines.cmake:"
          cat qpm_defines.cmake
          echo ""
          echo "extern.cmake (first 30 lines):"
          head -30 extern.cmake

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_CXX_STANDARD=20 \
            -G Ninja

      - name: Build
        working-directory: build
        run: ninja -v

      - name: Verify build output
        run: |
          if [ ! -f "build/libslicevisualizer.so" ]; then
            echo "ERROR: libslicevisualizer.so not found after build"
            ls -la build/
            exit 1
          fi
          echo "Build succeeded:"
          ls -lh build/libslicevisualizer.so

      - name: Create QMOD structure
        run: |
          mkdir -p qmod_build/libs/arm64-v8a
          cp build/libslicevisualizer.so qmod_build/libs/arm64-v8a/

      - name: Create mod.json from template
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -e "s/\${mod_name}/Slice Visualizer/g" \
              -e "s/\${mod_id}/slicevisualizer/g" \
              -e "s/\${version}/$VERSION/g" \
              mod.template.json > qmod_build/mod.json
          echo "Generated mod.json:"
          cat qmod_build/mod.json

      - name: Copy cover image
        run: |
          if [ -f cover.png ]; then
            cp cover.png qmod_build/
            echo "Cover image included."
          else
            echo "No cover.png found, skipping."
          fi

      - name: Create QMOD file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd qmod_build
          zip -r "../slicevisualizer-${VERSION}.qmod" .
          cd ..
          echo "Created: slicevisualizer-${VERSION}.qmod"
          ls -lh "slicevisualizer-${VERSION}.qmod"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          path: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          body: |
            # Slice Visualizer v${{ steps.version.outputs.version }}

            **Beat Saber 1.40.8 Compatible**

            Automated build from GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -rf qmod_build
