name: Build QMOD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build jq

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.22.1'

    - name: Get version from qpm.json
      id: version
      run: |
        VERSION=$(jq -r '.info.version' qpm.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Setup QPM
      run: |
        mkdir -p $HOME/qpm
        cd $HOME/qpm
        wget https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip -O qpm.zip
        unzip -q qpm.zip
        chmod +x qpm
        cd -
        export PATH="$HOME/qpm:$PATH"
        echo "$HOME/qpm" >> $GITHUB_PATH

    - name: Restore QPM dependencies
      continue-on-error: true
      run: |
        qpm restore || echo "QPM restore had issues, continuing with build"

    - name: Create build directory
      run: mkdir -p build

    - name: Generate qpm_defines if missing
      run: |
        if [ ! -f qpm_defines.cmake ]; then
          cat > qpm_defines.cmake << 'EOF'
cmake_minimum_required(VERSION 3.21)

set(COMPILE_ID "slicevisualizer")
set(MOD_VERSION "${PROJECT_VERSION}")
set(MOD_ID "slicevisualizer")

set(SHARED_DIR ${CMAKE_CURRENT_SOURCE_DIR}/shared)
set(EXTERN_DIR ${CMAKE_CURRENT_SOURCE_DIR}/extern)
set(CODEGEN_ID "codegen")

if(NOT EXISTS "${EXTERN_DIR}")
    message(FATAL_ERROR "extern directory not found")
endif()

set(so_list "")
set(a_list "")

file(GLOB_RECURSE extern_libs "${EXTERN_DIR}/**/*.so")
list(APPEND so_list ${extern_libs})

file(GLOB_RECURSE extern_archives "${EXTERN_DIR}/**/*.a")
list(APPEND a_list ${extern_archives})

macro(RECURSE_FILES return_list dir_name)
    file(GLOB_RECURSE ${return_list} "${dir_name}")
endmacro(RECURSE_FILES)
EOF
        fi

    - name: Configure CMake
      working-directory: build
      run: |
        cmake .. \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_CXX_STANDARD=20 \
          -G Ninja

    - name: Build
      working-directory: build
      run: ninja

    - name: Create QMOD structure
      run: |
        mkdir -p qmod_build/libs/arm64-v8a
        if [ -f build/libslicevisualizer.so ]; then
          cp build/libslicevisualizer.so qmod_build/libs/arm64-v8a/
        elif [ -f build/libslicevisualizer_debug.so ]; then
          cp build/libslicevisualizer_debug.so qmod_build/libs/arm64-v8a/libslicevisualizer.so
        else
          echo "Error: .so file not found in build directory"
          ls -la build/
          exit 1
        fi

    - name: Create mod.json
      run: |
        cat > qmod_build/mod.json << EOF
        {
          "\$schema": "https://raw.githubusercontent.com/Lauriethefish/QuestPatcher.QMod/main/QuestPatcher.QMod/Resources/qmod.schema.json",
          "_QPVersion": "0.1.1",
          "name": "Slice Visualizer",
          "id": "slicevisualizer",
          "author": "schmiddyaleksa-max",
          "version": "${{ steps.version.outputs.version }}",
          "packageId": "com.beatgames.beatsaber",
          "packageVersion": "1.40.8_11819662659",
          "description": "See your slices right in front of you",
          "coverImage": "cover.png",
          "dependencies": [],
          "modFiles": [],
          "libraryFiles": [],
          "fileCopies": []
        }
        EOF

    - name: Copy cover image
      run: |
        if [ -f cover.png ]; then
          cp cover.png qmod_build/
        fi

    - name: Create QMOD file
      run: |
        cd qmod_build
        zip -r ../slicevisualizer-${{ steps.version.outputs.version }}.qmod .
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: slicevisualizer-${{ steps.version.outputs.version }}.qmod
        path: slicevisualizer-${{ steps.version.outputs.version }}.qmod
        retention-days: 30

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: slicevisualizer-${{ steps.version.outputs.version }}.qmod
        body: |
          # Slice Visualizer v${{ steps.version.outputs.version }}
          
          **Beat Saber 1.40.8 Compatible**
          
          Automated build from GitHub Actions
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup
      if: always()
      run: |
        rm -rf qmod_build
