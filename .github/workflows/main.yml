name: Build QMOD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.22.1'

    - name: Get version from qpm.json
      id: version
      run: |
        VERSION=$(jq -r '.info.version' qpm.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Create extern directory structure
      run: |
        mkdir -p extern/includes
        mkdir -p extern/libs/arm64-v8a

    - name: Download beatsaber-hook
      run: |
        cd extern
        wget -q https://github.com/sc2ad/beatsaber-hook/releases/download/v3.14.0/beatsaber-hook_3_14_0.zip
        unzip -q beatsaber-hook_3_14_0.zip
        rm beatsaber-hook_3_14_0.zip

    - name: Download modloader
      run: |
        cd extern
        wget -q https://github.com/sc2ad/modloader/releases/download/v1.2.3/modloader_1_2_3.zip
        unzip -q modloader_1_2_3.zip
        rm modloader_1_2_3.zip

    - name: Download custom-types
      run: |
        cd extern
        wget -q https://github.com/sc2ad/BeatSaber-IPA-Reloaded/releases/download/custom-types-0.15.21/custom-types_0_15_21.zip
        unzip -q custom-types_0_15_21.zip
        rm custom-types_0_15_21.zip

    - name: Download questui
      run: |
        cd extern
        wget -q https://github.com/RedBrumbler/questui/releases/download/v0.17.3/questui_0_17_3.zip
        unzip -q questui_0_17_3.zip
        rm questui_0_17_3.zip

    - name: Download config-utils
      run: |
        cd extern
        wget -q https://github.com/Lauriethefish/config-utils/releases/download/v1.0.2/config-utils_1_0_2.zip
        unzip -q config-utils_1_0_2.zip
        rm config-utils_1_0_2.zip

    - name: Download codegen
      run: |
        cd extern
        wget -q https://github.com/sc2ad/BeatSaber-IPA-Reloaded/releases/download/codegen-0.33.0/codegen_0_33_0.zip
        unzip -q codegen_0_33_0.zip
        rm codegen_0_33_0.zip

    - name: Create build directory
      run: mkdir -p build

    - name: Configure CMake
      working-directory: build
      run: |
        cmake .. \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -G Ninja

    - name: Build
      working-directory: build
      run: ninja

    - name: Package QMOD
      working-directory: build
      run: |
        mkdir -p qmod/libs/arm64-v8a
        mkdir -p qmod/mod.json
        cp libslicevisualizer.so qmod/libs/arm64-v8a/
        cd ..
        cp mod.template.json mod.json
        sed -i 's/${mod_name}/Slice Visualizer/g' mod.json
        sed -i 's/${mod_id}/slicevisualizer/g' mod.json
        sed -i "s/\${version}/${{ steps.version.outputs.version }}/g" mod.json
        mv mod.json build/qmod/
        if [ -f cover.png ]; then cp cover.png build/qmod/; fi
        cd build
        zip -r slicevisualizer-${{ steps.version.outputs.version }}.qmod qmod/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: slicevisualizer-${{ steps.version.outputs.version }}.qmod
        path: build/slicevisualizer-${{ steps.version.outputs.version }}.qmod
        retention-days: 30

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/slicevisualizer-${{ steps.version.outputs.version }}.qmod
        body: |
          # Slice Visualizer v${{ steps.version.outputs.version }}
          
          Automated build from GitHub Actions
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup
      if: always()
      run: |
        rm -rf build/qmod
        rm -f build/*.qmod
