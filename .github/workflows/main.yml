name: Build QMOD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build jq curl zip

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'

      - name: Get version from qpm.json
        id: version
        run: |
          VERSION=$(jq -r '.info.version' qpm.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download and setup QPM
        run: |
          mkdir -p $HOME/.local/bin
          # Pinned to the non-musl x64 build (the musl build also appears in results
          # which broke dynamic URL selection — use a direct URL instead)
          curl -L "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip" \
            -o /tmp/qpm.zip
          unzip -q /tmp/qpm.zip -d $HOME/.local/bin
          chmod +x $HOME/.local/bin/qpm
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          qpm --version

      - name: Pre-populate QPM cache with libil2cpp headers
        # il2cpp.thnght.pro (QPM's libil2cpp source host) is permanently offline.
        # We download the headers directly from the official QPM GitHub mirror
        # and place them in QPM's cache directory so QPM restore never needs to
        # contact the dead server.
        run: |
          CACHE_DIR="$HOME/.local/share/QPM-RS/cache"
          IL2CPP_CACHE="$CACHE_DIR/libil2cpp/0.2.5/src"
          mkdir -p "$IL2CPP_CACHE"

          echo "Downloading libil2cpp 0.2.5 headers from GitHub mirror..."
          curl -L "https://github.com/QuestPackageManager/Il2CppSources/archive/refs/tags/2019.zip" \
            -o /tmp/il2cpp.zip

          # Extract into the QPM cache location it expects
          unzip -q /tmp/il2cpp.zip -d /tmp/il2cpp_src
          # The zip extracts to Il2CppSources-2019/ — move contents into cache
          SRC_DIR=$(find /tmp/il2cpp_src -mindepth 1 -maxdepth 1 -type d | head -1)
          cp -r "$SRC_DIR/." "$IL2CPP_CACHE/"
          echo "libil2cpp headers cached at: $IL2CPP_CACHE"
          ls "$IL2CPP_CACHE" | head -10

      - name: Restore dependencies with QPM
        run: |
          # QPM restore downloads headers into extern/ and generates
          # qpm_defines.cmake and extern.cmake — do NOT overwrite these.
          qpm restore
          echo "QPM restore finished with exit code: $?"

      - name: Verify dependencies were restored
        run: |
          echo "=== extern/includes contents ==="
          find extern/includes -maxdepth 2 -type d 2>/dev/null || echo "(empty or missing)"

          MISSING=0
          for header in \
            "modloader/shared/modloader.hpp" \
            "beatsaber-hook/shared/utils/hooking.hpp" \
            "questui/shared/QuestUI.hpp" \
            "config-utils/shared/config-utils.hpp"; do
            if [ ! -f "extern/includes/$header" ]; then
              echo "ERROR: Missing extern/includes/$header"
              MISSING=1
            else
              echo "OK: $header"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1
          echo "All required headers present!"

      - name: Verify QPM-generated cmake files
        run: |
          [ -f "qpm_defines.cmake" ] || { echo "ERROR: qpm_defines.cmake missing"; exit 1; }
          [ -f "extern.cmake" ]      || { echo "ERROR: extern.cmake missing"; exit 1; }
          echo "=== qpm_defines.cmake ==="
          cat qpm_defines.cmake
          echo ""
          echo "=== extern.cmake (first 20 lines) ==="
          head -20 extern.cmake

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_CXX_STANDARD=20 \
            -G Ninja

      - name: Build
        working-directory: build
        run: ninja -v

      - name: Verify build output
        run: |
          if [ ! -f "build/libslicevisualizer.so" ]; then
            echo "ERROR: libslicevisualizer.so not found after build"
            ls -la build/
            exit 1
          fi
          echo "Build succeeded:"
          ls -lh build/libslicevisualizer.so

      - name: Create QMOD structure
        run: |
          mkdir -p qmod_build/libs/arm64-v8a
          cp build/libslicevisualizer.so qmod_build/libs/arm64-v8a/

      - name: Create mod.json from template
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -e "s/\${mod_name}/Slice Visualizer/g" \
              -e "s/\${mod_id}/slicevisualizer/g" \
              -e "s/\${version}/$VERSION/g" \
              mod.template.json > qmod_build/mod.json
          echo "Generated mod.json:"
          cat qmod_build/mod.json

      - name: Copy cover image
        run: |
          if [ -f cover.png ]; then
            cp cover.png qmod_build/
            echo "Cover image included."
          else
            echo "No cover.png found, skipping."
          fi

      - name: Create QMOD file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd qmod_build
          zip -r "../slicevisualizer-${VERSION}.qmod" .
          cd ..
          echo "Created: slicevisualizer-${VERSION}.qmod"
          ls -lh "slicevisualizer-${VERSION}.qmod"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          path: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slicevisualizer-${{ steps.version.outputs.version }}.qmod
          body: |
            # Slice Visualizer v${{ steps.version.outputs.version }}

            **Beat Saber 1.40.8 Compatible**

            Automated build from GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -rf qmod_build
